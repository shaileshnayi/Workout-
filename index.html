<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout & Muscle Volume Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
    <div class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-md overflow-hidden md:max-w-2xl p-6">
        <h1 class="text-2xl font-bold mb-4 text-center text-indigo-400">Workout Rep & Set Tracker</h1>

        <!-- Input Form -->
        <form id="workout-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Muscle Group</label>
                <select id="muscle-group" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                    <option value="Chest">Chest</option>
                    <option value="Back">Back</option>
                    <option value="Legs">Legs</option>
                    <option value="Shoulders">Shoulders</option>
                    <option value="Arms">Arms</option>
                    <option value="Core">Core</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium">Exercise Name</label>
                <input type="text" id="exercise-name" placeholder="e.g., Bench Press" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">Sets</label>
                    <input type="number" id="sets" value="1" min="1" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium">Reps</label>
                    <input type="number" id="reps" value="10" min="1" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">
                Log Set
            </button>
        </form>

        <!-- Logged Workouts Display -->
        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-2">Today's Log</h2>
            <div id="log-container" class="space-y-2">
                <!-- Dynamic logs appear here -->
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('workout-form');
        const logContainer = document.getElementById('log-container');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const muscle = document.getElementById('muscle-group').value;
            const exercise = document.getElementById('exercise-name').value;
            const sets = document.getElementById('sets').value;
            const reps = document.getElementById('reps').value;

            const logItem = document.createElement('div');
            logItem.className = "bg-gray-700 p-3 rounded-md flex justify-between items-center";
            logItem.innerHTML = `
                <div>
                    <span class="font-bold text-indigo-300">${muscle}</span>: ${exercise}
                    <div class="text-sm text-gray-400">Sets: ${sets} | Reps: ${reps}</div>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300 text-sm">Delete</button>
            `;

            logContainer.prepend(logItem);
            form.reset();
        });
    </script>
</body>
</html>
