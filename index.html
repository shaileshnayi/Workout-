<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout & Muscle Volume Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
    <div class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-md overflow-hidden md:max-w-2xl p-6 space-y-6">
        <h1 class="text-2xl font-bold text-center text-indigo-400">Workout Rep & Set Tracker</h1>

        <!-- Input Form -->
        <form id="workout-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Workout Date</label>
                <input type="date" id="workout-date" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
            </div>

            <div>
                <label class="block text-sm font-medium">Muscle Group</label>
                <select id="muscle-group" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                    <option value="Chest">Chest</option>
                    <option value="Back">Back</option>
                    <option value="Legs">Legs</option>
                    <option value="Shoulders">Shoulders</option>
                    <option value="Arms">Arms</option>
                    <option value="Core">Core</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium">Exercise Name</label>
                <input type="text" id="exercise-name" placeholder="e.g., Bench Press" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-sm font-medium">Weight</label>
                    <input type="number" id="weight" placeholder="kg/lbs" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium">Sets</label>
                    <input type="number" id="sets" value="1" min="1" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium">Reps</label>
                    <input type="number" id="reps" value="10" min="1" required class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white p-2">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">
                Log Set
            </button>
        </form>

        <!-- Workout History Section -->
        <div>
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-semibold">Workout History</h2>
                <button onclick="clearHistory()" class="text-xs text-red-400 hover:text-red-300">Clear History</button>
            </div>
            <div id="history-container" class="space-y-4">
                <!-- Grouped history logs appear here -->
            </div>
        </div>
    </div>

    <script>
        // Set today's date by default on load
        document.getElementById('workout-date').valueAsDate = new Date();

        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];

        const form = document.getElementById('workout-form');
        const historyContainer = document.getElementById('history-container');

        function renderApp() {
            historyContainer.innerHTML = '';

            if (workouts.length === 0) {
                historyContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No workout history yet.</p>';
                return;
            }

            // Group workouts by date
            let groupedByDate = {};
            workouts.forEach((item, index) => {
                if (!groupedByDate[item.date]) {
                    groupedByDate[item.date] = [];
                }
                groupedByDate[item.date].push({ ...item, globalIndex: index });
            });

            // Sort dates descending (newest first)
            const sortedDates = Object.keys(groupedByDate).sort().reverse();

            sortedDates.forEach(date => {
                const dateGroupCard = document.createElement('div');
                dateGroupCard.className = "bg-gray-700 p-4 rounded-lg space-y-3";

                let exercisesHTML = '';
                let totalSets = 0;

                groupedByDate[date].forEach(item => {
                    totalSets += parseInt(item.sets) || 0;
                    exercisesHTML += `
                        <div class="bg-gray-800 p-2.5 rounded flex justify-between items-center text-sm">
                            <div>
                                <span class="font-bold text-indigo-300">${item.muscle}</span>: ${item.exercise}
                                <div class="text-xs text-gray-400">${item.weight ? item.weight + 'kg/lbs • ' : ''}Sets: ${item.sets} | Reps: ${item.reps}</div>
                            </div>
                            <button onclick="deleteWorkout(${item.globalIndex})" class="text-red-400 hover:text-red-300 text-xs">Delete</button>
                        </div>
                    `;
                });

                dateGroupCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                        <span class="font-bold text-indigo-400">${date}</span>
                        <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-300">Total Sets: ${totalSets}</span>
                    </div>
                    <div class="space-y-2">
                        ${exercisesHTML}
                    </div>
                `;

                historyContainer.appendChild(dateGroupCard);
            });

            localStorage.setItem('workouts', JSON.stringify(workouts));
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const newWorkout = {
                date: document.getElementById('workout-date').value,
                muscle: document.getElementById('muscle-group').value,
                exercise: document.getElementById('exercise-name').value,
                weight: document.getElementById('weight').value,
                sets: document.getElementById('sets').value,
                reps: document.getElementById('reps').value
            };

            workouts.push(newWorkout);
            renderApp();
            
            // Keep the selected date and reset the rest of the form fields
            const currentDate = document.getElementById('workout-date').value;
            form.reset();
            document.getElementById('workout-date').value = currentDate;
            document.getElementById('sets').value = '1';
            document.getElementById('reps').value = '10';
        });

        function deleteWorkout(index) {
            workouts.splice(index, 1);
            renderApp();
        }

        function clearHistory() {
            if(confirm('Are you sure you want to clear all workout history?')) {
                workouts = [];
                renderApp();
            }
        }

        renderApp();
    </script>
</body>
</html>
